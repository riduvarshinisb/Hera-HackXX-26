<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHEild - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>SHEild</h1>
    <p class="muted">Secure evidence vault + integrity verification.</p>

    <section class="card">
      <h2>Login</h2>

      <div class="grid">
        <input id="email" type="email" placeholder="Email" autocomplete="email" />
        <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
      </div>

      <div class="actions">
        <button id="googleBtn">Continue with Google</button>
        <button id="signupBtn">Sign up</button>
        <button id="loginBtn">Log in</button>
      </div>

      <p id="authStatus" class="status"></p>
    </section>
    <section class="card" id="evidenceCard" style="display:none;">
  <h2>Evidence Upload</h2>
  <p class="muted">Upload evidence. SHEild will hash and log it automatically.</p>

  <div class="grid" style="grid-template-columns: 1fr;">
    <input id="evidenceTitle" type="text" placeholder="Evidence title (e.g., Instagram DM threat)" />
    <select id="evidenceType">
      <option value="screenshot">Screenshot</option>
      <option value="video">Video</option>
      <option value="chat">Chat Export</option>
      <option value="pdf">PDF</option>
      <option value="other">Other</option>
    </select>
    <input id="evidenceFile" type="file" />
  </div>

  <div class="actions">
    <button id="uploadEvidenceBtn">Upload Evidence</button>
  </div>

  <p id="uploadStatus" class="status"></p>
</section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
